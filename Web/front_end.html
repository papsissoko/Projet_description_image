<!--en cours de développement-->
<!DOCTYPE html>
<html>
<head>
    <title>Description d'une image </title>
    <meta  charset="UTF-8">
    

    <style>
        .upload_container{
          display: flex;
          flex-direction: column;
        }
        .send_to_prediction{    
            display: flex;
            align-items: center;
            justify-content: space-between;
            width : 100%; 
            height: 100px;
            flex-direction: row;
            margin-top: 300px;
            background-color: rgb(165, 163, 163);
            border-radius: 10px;
            

        }
        #preview{max-width :100%; margin-top: 10px; display: None;}
        #logo_send{ width: 30px; height:30px}
        #file_logo{ width: 30px; height:30px}
        #button_send{align-self: center; max-width: 30px;height:30px; background-color: none; justify-content: center;margin-top: 15px;}
    </style>
</head>
<body>

   <h5> Faisons une description de votre image avec mon modèle </h5> 
   
   <div class=" upload_container">
   <input type="file", id="ImageInput", accept="image/*" >
   <br>
   <img id="image_uploaded", src="#", alt="télécharger une image pour faire de la décrire">
   </div>

   <div class= "send_to_prediction">
     <div style=" margin-left: 10px; justify-content: space-around; flex-direction: column;">
       <p style="display: flex; font-size: 10;"> Send to prediction</p>
        <img id ="file_logo" ,  src="https://img.icons8.com/?size=100&id=1501&format=png&color=000000">
     </div>

     <div style="margin-right: 10px;">
        <button id="button_send">
           <img id ="logo_send", src="https://img.icons8.com/?size=100&id=93339&format=png&color=000000">
        </button>
     </div>
    
   </div>

<script>

  const image_uploaded = document.getElementById("ImageInput")
  const preview =  document.getElementById("image_uploaded")
  
  ImageInput.onchange = evt =>{
    const[file] = ImageInput.files;  
    if (file){
         preview.src = URL.createObjectURL(file)
         preview.style.display ='block'

    }
  }


</script>
</body>
</html>
